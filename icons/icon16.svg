<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Jira 蓝色背景 -->
  <rect width="16" height="16" rx="3" fill="#0052CC"/>

  <!-- 白色方块组成的 J 图案 -->
  <rect x="3" y="3" width="4" height="4" rx="1" fill="white" opacity="0.95"/>
  <rect x="9" y="3" width="4" height="4" rx="1" fill="white" opacity="0.7"/>
  <rect x="3" y="9" width="4" height="4" rx="1" fill="white" opacity="0.85"/>

  <!-- 橙色圆点代表故事点 -->
